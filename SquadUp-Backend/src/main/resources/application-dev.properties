# ──────────────────────────────────────────────
#  application-dev.properties — SquadUp DESARROLLO LOCAL
#  BD: H2 en memoria. No requiere PostgreSQL instalado.
#  Activa con: -Dspring-boot.run.profiles=dev
# ──────────────────────────────────────────────

# ── H2 en memoria ─────────────────────────────
spring.datasource.url=jdbc:h2:mem:squadupdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Permitir la consola H2 desde el browser sin auth
spring.h2.console.settings.web-allow-others=false

# ── JPA: NO generar DDL — Spring ejecuta schema-h2.sql ───────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── SQL Init: crea tablas con schema H2-compatible ────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql

# ── JWT (clave dev >= 32 chars) ────────────────
app.jwt.secret=SquadUpDevSecretKey2024XyzAbc12345678
app.jwt.expiration-ms=86400000

# ── OAuth2 placeholders para dev ───────────────
spring.security.oauth2.client.registration.google.client-id=dev-google-id
spring.security.oauth2.client.registration.google.client-secret=dev-google-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.discord.client-id=dev-discord-id
spring.security.oauth2.client.registration.discord.client-secret=dev-discord-secret
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/discord
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=username

# ── Upload / WebSocket / Servidor ──────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads
app.websocket.heartbeat=30000
server.port=8080
server.error.include-message=always
