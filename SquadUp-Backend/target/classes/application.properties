# ──────────────────────────────────────────────
#  application.properties — SquadUp Backend
#  Configuración de: BD, JPA, OAuth2, JWT, WebSocket, Archivos
# ──────────────────────────────────────────────

spring.application.name=squadup-backend

# ── Base de datos MySQL ────────────────
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/squadup_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=243468
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────
app.jwt.secret=CAMBIA_ESTO_POR_UNA_CLAVE_SECRETA_DE_64_CARACTERES_MINIMO
app.jwt.expiration-ms=3600000

# ── OAuth2 — Google ─────────────────────────
spring.security.oauth2.client.registration.google.client-id=TU_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=TU_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# ── OAuth2 — Discord ────────────────────────
spring.security.oauth2.client.registration.discord.client-id=TU_DISCORD_CLIENT_ID
spring.security.oauth2.client.registration.discord.client-secret=TU_DISCORD_CLIENT_SECRET
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/discord
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=username

# ── Upload de archivos (avatares, imágenes lobby) ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── WebSocket ───────────────────────────────
app.websocket.heartbeat=30000

# ── Servidor ────────────────────────────────
server.port=8080
server.error.include-message=always
