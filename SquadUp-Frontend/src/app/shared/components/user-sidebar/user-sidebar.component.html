<nav class="user-sidebar">

  <!-- Perfil del usuario -->
  <div class="profile-section">
    @if (userAvatarUrl) {
      <img class="avatar-img" [src]="userAvatarUrl" alt="Avatar de usuario">
    } @else {
      <div class="avatar-generic">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
    }
    <div class="profile-info">
      <span class="profile-name">{{ userName }}</span>
      <span class="profile-email">{{ userEmail }}</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Opciones de navegación -->
  <ul class="nav-list">

    <!-- Editar Perfil -->
    <li>
      <button class="nav-item" [routerLink]="['/edit-profile']">
        <div class="nav-icon" style="background: rgba(193,17,159,0.12); border-color: rgba(193,17,159,0.3);">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#C1119F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="nav-text">
          <span class="nav-label">Editar perfil</span>
          <span class="nav-desc">Avatar, contraseña y nombre</span>
        </div>
        <svg class="nav-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </li>

    <!-- Lobbys -->
    <li>
      <button class="nav-item" [routerLink]="['/lobbys']">
        <div class="nav-icon" style="background: rgba(217,0,108,0.12); border-color: rgba(217,0,108,0.3);">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#D9006C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="nav-text">
          <span class="nav-label">Lobbys</span>
          <span class="nav-desc">Administrar y editar grupos</span>
        </div>
        <svg class="nav-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </li>

    <!-- Guardados -->
    <li>
      <button class="nav-item" [routerLink]="['/saved-posts']">
        <div class="nav-icon" style="background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3);">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="nav-text">
          <span class="nav-label">Guardados</span>
          <span class="nav-desc">Publicaciones guardadas</span>
        </div>
        <svg class="nav-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </li>

  </ul>

</nav>
