<div class="post-card">
  <!-- Header: Info del usuario y botón de guardar -->
  <div class="card-header">
    <div class="user-info">
      <!-- Avatar del usuario con la imagen del grupo superpuesta -->
      <div class="avatar-wrapper">
        <!-- Avatar genérico -->
      <div class="user-avatar-generic">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
      <div class="group-badge" [title]="post.groupName">
          <img class="group-img" [src]="post.groupImage" [alt]="post.groupName">
        </div>
      </div>

      <div class="user-meta">
        <span class="username">{{ post.authorUsername }}</span>
        <span class="timestamp">{{ post.createdAt | date:'short' }}</span>
      </div>
    </div>

    <!-- Botón de guardar -->
    <button
      class="save-btn"
      [class.saved]="post.savedByCurrentUser"
      (click)="toggleSave()"
      [title]="post.savedByCurrentUser ? 'Guardado' : 'Guardar publicación'">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" [attr.fill]="post.savedByCurrentUser ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>
  </div>

  <!-- Espacio de imagen: placeholder si no hay imagen, imagen real si la hay -->
  <div class="card-image-wrapper">
    @if (post.imageUrl) {
      <img class="post-image" [src]="post.imageUrl" [alt]="'Publicación de ' + post.authorUsername">
    } @else {
      <div class="image-placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <span>Sin imagen</span>
      </div>
    }
  </div>
</div>
