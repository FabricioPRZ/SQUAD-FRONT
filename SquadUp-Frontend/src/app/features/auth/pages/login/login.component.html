<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">BIENVENIDO</h1>
      <p class="auth-subtitle">Ingresa tus datos para continuar</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <!-- Correo -->
      <div class="form-group">
        <label for="email">Correo</label>
        <div class="input-container">
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="loginData.email"
            placeholder="Nombre completo" 
            required>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-container password-group">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            name="password"
            [(ngModel)]="loginData.password"
            placeholder="Introduce tu contraseña" 
            required>
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" [title]="showPassword ? 'Ocultar' : 'Mostrar'">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>


      <!-- Botón de acción -->
      <button type="submit" class="auth-btn">
        Iniciar Sesión
      </button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a [routerLink]="['/register']">Registrate</a></p>
    </div>
  </div>
</div>
