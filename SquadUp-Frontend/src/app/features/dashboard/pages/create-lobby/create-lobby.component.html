<div class="page-wrapper">
  <div class="bg-overlay"></div>
  <app-header [isMinimal]="false"></app-header>

  <main class="page-content">

    <!-- Título banner -->
    <div class="title-banner">{{ isEditMode ? 'Editar Lobby' : 'Crear Lobby' }}</div>

    <!-- Card principal -->
    <div class="lobby-card">

      <!-- Fila: Imagen + Acceso -->
      <div class="top-row">
        <div class="field-block">
          <span class="field-label">IMAGEN</span>
          <label class="image-upload-area" [class.has-image]="lobbyData.image">
            <div class="image-preview-inner"
                [style.background-image]="lobbyData.image ? 'url(' + lobbyData.image + ')' : 'none'">
              @if (!lobbyData.image) {
                <svg class="img-placeholder-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                <span class="upload-label-text">SUBIR</span>
              }
            </div>
            <input type="file" (change)="onImageSelected($event)" accept="image/*" hidden>
          </label>
        </div>

        <div class="field-block access-block">
          <span class="field-label">ACCESO</span>
          <button class="access-btn" [class.private]="lobbyData.privacy === 'PRIVATE'" (click)="togglePrivacy()">
            @if (lobbyData.privacy !== 'PRIVATE') {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
              </svg>
              <span>Lobby abierto</span>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <span>Lobby privado</span>
            }
          </button>
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- Nombre -->
      <div class="field-block">
        <span class="field-label">NOMBRE DEL LOBBY</span>
        <input type="text" class="lobby-input" [(ngModel)]="lobbyData.name"
          placeholder="Ej: Squad Los Inmortales...">
      </div>

      <!-- Descripción -->
      <div class="field-block">
        <span class="field-label">DESCRIPCIÓN</span>
        <textarea class="lobby-textarea" [(ngModel)]="lobbyData.description"
          placeholder="Describe tu lobby: reglas, estilo de juego, nivel requerido..."></textarea>
      </div>

      <!-- Jugadores Máx. -->
      <div class="field-block">
        <span class="field-label">JUGADORES MÁX.</span>
        <div class="players-row">
          <button class="player-btn" (click)="decrementMembers()">−</button>
          <input
            type="number"
            class="players-display"
            [(ngModel)]="lobbyData.maxMembers"
            (blur)="clampMembers()"
            min="2"
            max="500">
          <button class="player-btn" (click)="incrementMembers()">+</button>
        </div>
      </div>

      <!-- Modo de juego -->
      <div class="field-block">
        <span class="field-label">MODO DE JUEGO</span>
        <div class="tags-row">
          @for (tag of availableTags; track tag) {
            <button class="tag-chip" [class.active]="lobbyData.tags.includes(tag)" (click)="toggleTag(tag)">
              {{ tag }}
            </button>
          }
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- Botones -->
      <div class="actions-row">
        <button class="btn-cancel" (click)="cancel()">Cancelar</button>
        <button class="btn-create" (click)="onSubmit()">
          {{ isEditMode ? 'Guardar Cambios' : 'Crear Lobby' }}
        </button>
      </div>

    </div>

    <!-- Sección de miembros removida — gestión de miembros pendiente de endpoint en backend -->

  </main>
</div>
