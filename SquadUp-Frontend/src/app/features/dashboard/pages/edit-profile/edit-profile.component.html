<div class="page-wrapper">
  <div class="bg-overlay"></div>
  <app-header [isMinimal]="false"></app-header>

  <main class="page-content">

    <div class="title-banner">Editar Perfil</div>

    <div class="profile-card">

      <!-- ── Avatar ── -->
      <div class="avatar-section">
        <div class="avatar-container">
          @if (profileData.avatar) {
            <img class="avatar-img" [src]="profileData.avatar" alt="Avatar">
          } @else {
            <div class="avatar-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
              </svg>
            </div>
          }

          <!-- Overlay editar avatar -->
          <label class="avatar-edit-overlay" title="Cambiar avatar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
            </svg>
            <input type="file" (change)="onAvatarSelected($event)" accept="image/*" hidden>
          </label>
        </div>

        <div class="avatar-actions">
          <span class="avatar-hint">Haz clic en el avatar para cambiarlo</span>
          @if (profileData.avatar) {
            <button class="remove-avatar-btn" (click)="removeAvatar()">Quitar foto</button>
          }
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ── Datos personales ── -->
      <div class="section-title">INFORMACIÓN PERSONAL</div>

      <div class="fields-grid">
        <div class="field-block">
          <span class="field-label">NOMBRE COMPLETO</span>
          <input type="text" class="profile-input" [(ngModel)]="profileData.name" placeholder="Tu nombre completo">
        </div>
        <div class="field-block">
          <span class="field-label">NOMBRE DE USUARIO</span>
          <div class="input-prefix-wrap">
            <span class="input-prefix">&#64;</span>
            <input type="text" class="profile-input with-prefix" [(ngModel)]="profileData.username" placeholder="username">
          </div>
        </div>
        <div class="field-block full-width">
          <span class="field-label">CORREO ELECTRÓNICO</span>
          <input type="email" class="profile-input" [(ngModel)]="profileData.email" placeholder="tu@email.com">
        </div>
        <div class="field-block full-width">
          <span class="field-label">BIO</span>
          <textarea class="profile-textarea" [(ngModel)]="profileData.bio" placeholder="Cuéntanos algo sobre ti..."></textarea>
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ── Contraseña ── -->
      <button class="toggle-pass-btn" (click)="showPassSection = !showPassSection">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        {{ showPassSection ? 'Ocultar cambio de contraseña' : 'Cambiar contraseña' }}
        <svg class="chevron" [class.open]="showPassSection" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      @if (showPassSection) {
        <div class="fields-grid pass-section">
          <!-- Contraseña Actual -->
          <div class="field-block full-width">
            <span class="field-label">CONTRASEÑA ACTUAL</span>
            <div class="input-prefix-wrap">
              <input [type]="showCurrentPass ? 'text' : 'password'" class="profile-input" [(ngModel)]="profileData.currentPassword" placeholder="••••••••">
              <button type="button" class="password-toggle" (click)="toggleCurrentPassword()" [title]="showCurrentPass ? 'Ocultar' : 'Mostrar'">
                @if (showCurrentPass) {
                  <!-- Ojo tachado -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                } @else {
                  <!-- Ojo abierto -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                }
              </button>
            </div>
          </div>
          
          <!-- Nueva Contraseña -->
          <div class="field-block">
            <span class="field-label">NUEVA CONTRASEÑA</span>
            <div class="input-prefix-wrap">
              <input [type]="showNewPass ? 'text' : 'password'" class="profile-input" [(ngModel)]="profileData.newPassword" placeholder="••••••••">
              <button type="button" class="password-toggle" (click)="toggleNewPassword()" [title]="showNewPass ? 'Ocultar' : 'Mostrar'">
                @if (showNewPass) {
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                }
              </button>
            </div>
          </div>
          
          <!-- Confirmar Contraseña -->
          <div class="field-block">
            <span class="field-label">CONFIRMAR CONTRASEÑA</span>
            <div class="input-prefix-wrap">
              <input [type]="showConfirmPass ? 'text' : 'password'" class="profile-input" [(ngModel)]="profileData.confirmPassword" placeholder="••••••••">
              <button type="button" class="password-toggle" (click)="toggleConfirmPassword()" [title]="showConfirmPass ? 'Ocultar' : 'Mostrar'">
                @if (showConfirmPass) {
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                }
              </button>
            </div>
          </div>
        </div>
      }

      <div class="form-divider"></div>

      <!-- ── Acciones ── -->
      <div class="actions-row">
        <button class="btn-cancel" (click)="cancel()">Cancelar</button>
        <button class="btn-save" (click)="onSubmit()">Guardar Cambios</button>
      </div>

    </div>
  </main>
</div>
