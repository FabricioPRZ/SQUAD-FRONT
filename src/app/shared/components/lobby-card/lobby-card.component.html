<article class="lobby-card" [class.is-owner]="lobby.isOwner" [class.is-joined]="!lobby.isOwner">

  <!-- Imagen de portada con overlay -->
  <div class="card-image" [style.background-image]="lobby.image ? 'url(' + lobby.image + ')' : 'none'">
    <div class="image-overlay"></div>

    <!-- Insignia de dueño -->
    @if (lobby.isOwner) {
      <div class="owner-badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 17l3-8 6 5 6-5 3 8H3z"/>
        </svg>
      </div>
    }
  </div>

  <!-- Información del lobby -->
  <div class="card-body">
    <h3 class="lobby-name">{{ lobby.name }}</h3>
    <p class="lobby-desc">{{ lobby.description }}</p>
  </div>

  <!-- Acciones -->
  <div class="card-actions">
    @if (lobby.isOwner) {
      <button class="action-btn edit-btn" (click)="onEdit()" title="Editar lobby">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button class="action-btn delete-btn" (click)="onDelete()" title="Eliminar lobby">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    } @else {
      <button class="action-btn leave-btn" (click)="onLeave()" title="Abandonar lobby">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Abandonar
      </button>
    }
  </div>

</article>
