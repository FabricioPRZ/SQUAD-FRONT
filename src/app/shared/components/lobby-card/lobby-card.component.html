<article class="lobby-card" [class.is-owner]="lobby.isOwner" [class.is-joined]="!lobby.isOwner">

  <!-- Imagen de portada con overlay - click navega a chat -->
  <a [routerLink]="['/lobbys', lobby.id, 'chat']" class="card-image-link" [style.background-image]="lobby.image ? 'url(' + lobby.image + ')' : 'none'">
    <div class="image-overlay"></div>
    @if (lobby.isOwner) {
      <div class="owner-badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 17l3-8 6 5 6-5 3 8H3z"/>
        </svg>
      </div>
    }
  </a>

  <!-- Información del lobby -->
  <div class="card-body">
    <h3 class="lobby-name">{{ lobby.name }}</h3>
    <p class="lobby-desc">{{ lobby.description }}</p>
  </div>

  <!-- Acciones -->
  <div class="card-actions">
    <!-- Botón Chat con routerLink -->
    <a [routerLink]="['/lobbys', lobby.id, 'chat']" class="action-btn enter-btn" title="Entrar al chat">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Chat
    </a>
  </div>

</article>
