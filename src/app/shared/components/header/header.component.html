<header class="app-header" [class.minimal]="isMinimal">
  <!-- Degradado decorativo -->
  <div class="header-gradient"></div>

  <!-- Contenido -->
  @if (!isMinimal) {
    <div class="header-content">
      <!-- Izquierda: Barra de búsqueda -->
      <div class="header-left">
        <div class="search-bar">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            class="search-input"
            placeholder="Buscar..."
            [(ngModel)]="searchQuery"
            (keyup.enter)="onSearch()"
          />
          @if (searchQuery) {
            <button class="search-clear" (click)="searchQuery = ''">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          }
        </div>
      </div>

      <!-- Centro: Logo de la app -->
      <div class="header-center">
        <a class="logo-link" [routerLink]="['/home']" title="Ir al inicio">
          <img src="/images/logo.png" alt="SQUADUP Logo" class="header-logo">
        </a>
      </div>

      <!-- Derecha: Notificaciones + Perfil -->
      <div class="header-right">
        <!-- Botón Notificaciones -->
        <button
          class="notification-btn"
          [class.active]="showNotifications"
          (click)="toggleNotifications()"
          aria-label="Notificaciones">
          <svg class="bell-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          @if (hasNotifications) {
            <span class="notification-badge">{{ notificationCount }}</span>
          }
        </button>

        <!-- Separador -->
        <div class="header-separator"></div>

        <!-- Botón Perfil -->
        <button
          class="profile-btn"
          [class.active]="showUserMenu"
          (click)="toggleUserMenu()"
          aria-label="Menú de usuario">
          <div class="profile-info">
            <span class="profile-name">{{ session.username() || 'Usuario' }}</span>
            <span class="profile-role">Jugador</span>
          </div>
          <div class="avatar-wrapper">
            <img class="avatar" [src]="session.avatarUrl() || 'https://i.pravatar.cc/150?img=12'" [alt]="'Avatar de ' + session.username()" />
            <span class="avatar-status"></span>
          </div>
          <svg class="chevron-icon" [class.rotated]="showUserMenu"
               xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>
    </div>
  }
</header>

@if (!isMinimal) {
  <!-- Modal de Notificaciones -->
  <app-notifications-modal
    [isOpen]="showNotifications"
    (closed)="closeNotifications()">
  </app-notifications-modal>

  <!-- Modal de Menú de Usuario -->
  <app-user-menu-modal
    [isOpen]="showUserMenu"
    [userName]="session.username() || 'Usuario'"
    [userEmail]="session.email() || 'Sin correo'"
    [userAvatar]="session.avatarUrl() || 'https://i.pravatar.cc/150?img=12'"
    (closed)="closeUserMenu()"
    (optionSelected)="onMenuOption($event)"
    (logoutRequested)="onLogout()">
  </app-user-menu-modal>
}
