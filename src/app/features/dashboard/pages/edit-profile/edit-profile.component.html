<div class="page-wrapper">
  <div class="bg-overlay"></div>
  <app-header [isMinimal]="false"></app-header>

  <main class="page-content">

    <div class="title-banner">Editar Perfil</div>

    <div class="profile-card">

      <!-- ── Avatar ── -->
      <div class="avatar-section">
        <div class="avatar-container">
          @if (vm.avatarUrl()) {
            <img class="avatar-img" [src]="vm.avatarUrl()" alt="Avatar">
          } @else {
            <div class="avatar-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
              </svg>
            </div>
          }

          <!-- Overlay editar avatar -->
          <label class="avatar-edit-overlay" title="Cambiar avatar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
            </svg>
            <input type="file" (change)="onAvatarSelected($event)" accept="image/*" hidden>
          </label>
        </div>

        <div class="avatar-actions">
          <span class="avatar-hint">Haz clic en el avatar para cambiarlo</span>
          @if (vm.avatarUrl()) {
            <button class="remove-avatar-btn" (click)="vm.removeAvatar()">Quitar foto</button>
          }
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ── Datos personales ── -->
      <div class="section-title">INFORMACIÓN PERSONAL</div>

      <div class="fields-grid">
        <div class="field-block">
          <span class="field-label">NOMBRE COMPLETO</span>
          <input type="text" class="profile-input" [ngModel]="vm.name()" (ngModelChange)="vm.setName($event)" placeholder="Tu nombre completo" [disabled]="vm.loading() || vm.updating()">
        </div>
        <div class="field-block">
          <span class="field-label">NOMBRE DE USUARIO</span>
          <div class="input-prefix-wrap">
            <span class="input-prefix">&#64;</span>
            <input type="text" class="profile-input with-prefix" [ngModel]="vm.username()" placeholder="username" disabled>
          </div>
        </div>
        <div class="field-block full-width">
          <span class="field-label">CORREO ELECTRÓNICO</span>
          <input type="email" class="profile-input" [ngModel]="vm.email()" placeholder="correo no disponible" disabled>
        </div>
        <div class="field-block full-width">
          <span class="field-label">BIO</span>
          <textarea class="profile-textarea" [ngModel]="vm.bio()" (ngModelChange)="vm.setBio($event)" placeholder="Cuéntanos algo sobre ti..." [disabled]="vm.loading() || vm.updating()"></textarea>
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ── Contraseña ── -->
      <button class="toggle-pass-btn" (click)="showPassSection = !showPassSection">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        {{ showPassSection ? 'Ocultar cambio de contraseña' : 'Cambiar contraseña' }}
        <svg class="chevron" [class.open]="showPassSection" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      @if (showPassSection) {
        <div class="fields-grid pass-section">
          <!-- TODO: Cambio de contraseña no implementado en el backend -->
          <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: -10px;">El cambio de contraseña no está disponible actualmente.</p>
        </div>
      }

      <div class="form-divider"></div>

      <!-- ── Acciones ── -->
      <div class="actions-row">
        <button class="btn-cancel" (click)="vm.cancel()" [disabled]="vm.loading() || vm.updating()">Cancelar</button>
        <button class="btn-save" (click)="vm.saveChanges()" [disabled]="vm.loading() || vm.updating()">
          @if (vm.updating()) {
            Guardando...
          } @else {
            Guardar Cambios
          }
        </button>
      </div>

    </div>
  </main>
</div>
