<div class="page-wrapper">
  <div class="bg-overlay"></div>
  <app-header [isMinimal]="false"></app-header>

  <main class="page-content">
    <div class="title-banner">{{ vm.isEditMode() ? 'Editar Lobby' : 'Crear Lobby' }}</div>

    <div class="lobby-card">

      <!-- Imagen -->
      <div class="field-block">
        <span class="field-label">IMAGEN</span>
        <label class="image-upload-area" [class.has-image]="vm.imagePreview()">
          <div class="image-preview-inner"
            [style.background-image]="vm.imagePreview() ? 'url(' + vm.imagePreview() + ')' : 'none'">
            @if (!vm.imagePreview()) {
              <svg class="img-placeholder-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span class="upload-label-text">SUBIR</span>
            }
          </div>
          <input type="file" (change)="onImageSelected($event)" accept="image/*" hidden>
        </label>
      </div>

      <div class="form-divider"></div>

      <!-- Nombre -->
      <div class="field-block">
        <span class="field-label">NOMBRE DEL LOBBY</span>
        <input type="text" class="lobby-input"
          [ngModel]="vm.name()"
          (ngModelChange)="vm.setName($event)"
          placeholder="Ej: Squad Los Inmortales...">
      </div>

      <!-- Descripción -->
      <div class="field-block">
        <span class="field-label">DESCRIPCIÓN</span>
        <textarea class="lobby-textarea"
          [ngModel]="vm.description()"
          (ngModelChange)="vm.setDescription($event)"
          placeholder="Describe tu lobby: reglas, estilo de juego, nivel requerido...">
        </textarea>
      </div>

      <!-- Error -->
      @if (vm.error()) {
        <div class="auth-error">{{ vm.error() }}</div>
      }

      <div class="form-divider"></div>

      <!-- Botones -->
      <div class="actions-row">
        <button class="btn-cancel" (click)="cancel()">Cancelar</button>
        <button class="btn-create" (click)="onSubmit()" [disabled]="!vm.isFormValid() || vm.loading()">
          @if (vm.loading()) { Cargando... }
          @else { {{ vm.isEditMode() ? 'Guardar Cambios' : 'Crear Lobby' }} }
        </button>
      </div>

    </div>
  </main>
</div>
