<div class="home-container">
  <div class="bg-overlay"></div>

  <app-header [isMinimal]="false"></app-header>

  <div class="main-layout">
    <app-sidebar (groupSelected)="onGroupSelected($event)"></app-sidebar>

    <!-- Panel de Chat (modal lateral izquierdo) -->
    @if (selectedGroup()) {
      <aside class="chat-panel-wrapper">
        <app-chat 
          [lobbyId]="+selectedGroup()!.id" 
          (closeChat)="selectedGroup.set(null)">
        </app-chat>
      </aside>
    }

    <main class="content-area" [class.chat-open]="selectedGroup()">
      <div class="feed-column">
        <div class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <p>Selecciona un lobby para chatear</p>
          <a routerLink="/lobbys" class="action-link">Ver mis Lobbys</a>
        </div>
      </div>
    </main>

    <aside class="user-sidebar-wrapper">
      <app-user-sidebar (optionSelected)="onUserOption($event)"></app-user-sidebar>
    </aside>
  </div>
</div>
