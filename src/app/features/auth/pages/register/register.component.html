<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Crear Cuenta</h1>
      <p class="auth-subtitle">Ingresa tus datos para registrarte</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <!-- Nombre completo -->
      <div class="form-group">
        <label for="fullName">Nombre completo</label>
        <div class="input-container">
          <input 
            type="text" 
            id="fullName" 
            name="fullName"
            [(ngModel)]="userData.fullName"
            placeholder="Nombre completo" 
            required>
        </div>
      </div>

      <!-- Apodo -->
      <div class="form-group">
        <label for="nickname">Apodo</label>
        <div class="input-container">
          <input 
            type="text" 
            id="nickname" 
            name="nickname"
            [(ngModel)]="userData.nickname"
            placeholder="Nombre completo" 
            required>
        </div>
      </div>

      <!-- Correo -->
      <div class="form-group">
        <label for="email">Correo</label>
        <div class="input-container">
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="userData.email"
            placeholder="Nombre completo" 
            required>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-container password-group">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            name="password"
            [(ngModel)]="userData.password"
            placeholder="Introduce tu contraseña" 
            required>
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" [title]="showPassword ? 'Ocultar' : 'Mostrar'">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Confirmar contraseña -->
      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <div class="input-container password-group">
          <input 
            [type]="showConfirmPassword ? 'text' : 'password'" 
            id="confirmPassword" 
            name="confirmPassword"
            [(ngModel)]="userData.confirmPassword"
            placeholder="Confirma tu contraseña" 
            required>
          <button type="button" class="password-toggle" (click)="toggleConfirmPasswordVisibility()" [title]="showConfirmPassword ? 'Ocultar' : 'Mostrar'">
            @if (showConfirmPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Botón de acción -->
      <button type="submit" class="auth-btn">
        Acceder
      </button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a [routerLink]="['/login']">Inicia Sesion</a></p>
    </div>
  </div>
</div>
