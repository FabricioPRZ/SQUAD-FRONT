<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Crear Cuenta</h1>
      <p class="auth-subtitle">Ingresa tus datos para registrarte</p>
    </div>

    <form class="auth-form" (ngSubmit)="onSubmit()">

      <!-- Error global -->
      @if (vm.error()) {
        <div class="auth-error">{{ vm.error() }}</div>
      }

      <!-- Nombre -->
      <div class="form-group">
        <label for="name">Nombre</label>
        <div class="input-container">
          <input
            type="text"
            id="name"
            name="name"
            [value]="vm.name()"
            (input)="vm.setName($any($event.target).value)"
            placeholder="Tu nombre"
            required>
        </div>
      </div>

      <!-- Apellido -->
      <div class="form-group">
        <label for="lastname">Apellido</label>
        <div class="input-container">
          <input
            type="text"
            id="lastname"
            name="lastname"
            [value]="vm.lastname()"
            (input)="vm.setLastname($any($event.target).value)"
            placeholder="Tu apellido"
            required>
        </div>
      </div>

      <!-- Correo -->
      <div class="form-group">
        <label for="email">Correo</label>
        <div class="input-container">
          <input
            type="email"
            id="email"
            name="email"
            [value]="vm.email()"
            (input)="vm.setEmail($any($event.target).value)"
            placeholder="Tu correo electrónico"
            required>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-container password-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [value]="vm.password()"
            (input)="vm.setPassword($any($event.target).value)"
            placeholder="Introduce tu contraseña"
            required>
          <button type="button" class="password-toggle"
            (click)="togglePasswordVisibility()"
            [title]="showPassword ? 'Ocultar' : 'Mostrar'">
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Confirmar contraseña -->
      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <div class="input-container password-group">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            id="confirmPassword"
            name="confirmPassword"
            [value]="vm.confirmPassword()"
            (input)="vm.setConfirmPassword($any($event.target).value)"
            placeholder="Confirma tu contraseña"
            required>
          <button type="button" class="password-toggle"
            (click)="toggleConfirmPasswordVisibility()"
            [title]="showConfirmPassword ? 'Ocultar' : 'Mostrar'">
            @if (showConfirmPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Advertencia de contraseñas -->
      @if (vm.confirmPassword().length > 0 && !vm.passwordsMatch()) {
        <p class="auth-warning">Las contraseñas no coinciden</p>
      }

      <button type="submit" class="auth-btn" [disabled]="!vm.isFormValid() || vm.loading()">
        {{ vm.loading() ? 'Creando cuenta...' : 'Registrarse' }}
      </button>

    </form>

    <div class="auth-footer">
      <p>¿Ya tienes cuenta? <a [routerLink]="['/login']">Inicia Sesión</a></p>
    </div>
  </div>
</div>
