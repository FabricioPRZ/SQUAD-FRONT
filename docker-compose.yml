version: '3.8'

services:
  # ── BASE DE DATOS MYSQl ──
  mysql:
    image: mysql:8.0
    container_name: squadup-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: squadup_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./SquadUp-Backend/src/main/resources/schema-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── BACKEND SPRING BOOT ──
  backend:
    build:
      context: ./SquadUp-Backend
      dockerfile: Dockerfile
    container_name: squadup-backend
    environment:
      # Sobreescribe application.properties con la URL del host mysql de docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/squadup_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ── FRONTEND ANGULAR ──
  frontend:
    build:
      context: ./SquadUp-Frontend
      dockerfile: Dockerfile
    container_name: squadup-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
